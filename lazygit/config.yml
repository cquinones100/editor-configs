# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
gui:
  mainPanelSplitMode: 'vertical'
  sidePanelWidth: 0.15
  splitDiff: 'auto'
  commitHashLength: 0
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --wrap-max-lines=unlimited --side-by-side --tabs=2
keybinding:
  commits:
    moveDownCommit: '<c-n>'
    moveUpCommit: '<c-p>'
customCommands:
  - key: 'V'
    description: 'View PR for current branch'
    command: 'gh pr view --web'
    context: 'global'
    output: terminal
  - key: '<c-d>'
    description: 'Diff branch changes against main (GitHub-style)'
    command: 'git diff main...HEAD | delta --dark --paging=always --tabs=2'
    context: 'global'
    output: terminal
os:
  editPreset: 'nvim'
