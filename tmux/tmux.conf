# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on

# ── Status bar ─────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235,fg=colour248'

# Left: session name
set -g status-left-length 30
set -g status-left '#[bg=colour24,fg=colour255,bold]  #S #[bg=colour235] '

# Right: date and time
set -g status-right-length 40
set -g status-right '#[fg=colour244] %b %d  %H:%M '

# Window tabs
setw -g window-status-format '#[fg=colour244] #I:#W '
setw -g window-status-current-format '#[bg=colour238,fg=colour81,bold] #I:#W '
setw -g window-status-separator ''

# ── Pane borders ───────────────────────────────────────
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# ── Message / command prompt ───────────────────────────
set -g message-style 'bg=colour235,fg=colour81'
set -g message-command-style 'bg=colour235,fg=colour81'

# ── Accent color (derived from directory + git context) ─
# Updates pane border, session badge, and all window tab colors on pane focus.
set-hook -g pane-focus-in {
  run-shell -b '~/.config/tmux/update-colors.sh "#{pane_current_path}" "#{session_name}"'
}

# ── TPM (plugin manager) ──────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
