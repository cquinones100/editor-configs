# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on

# ── Status bar ─────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235,fg=colour248'

# Left: session name
set -g status-left-length 30
set -g status-left '#[bg=colour24,fg=colour255,bold]  #S #[bg=colour235] '

# Right: date and time
set -g status-right-length 40
set -g status-right '#[fg=colour244] %b %d  %H:%M '

# Window tabs
setw -g window-status-format '#[fg=colour244] #I:#W '
setw -g window-status-current-format '#[bg=colour238,fg=colour81,bold] #I:#W '
setw -g window-status-separator ''

# ── Pane borders ───────────────────────────────────────
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# ── Message / command prompt ───────────────────────────
set -g message-style 'bg=colour235,fg=colour81'
set -g message-command-style 'bg=colour235,fg=colour81'

# ── Pane splitting (keep current path) ─────────────────
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (Ctrl+hjkl, via iTerm escape sequences)
set -s user-keys[6] "\e[72;5~"
set -s user-keys[7] "\e[74;5~"
set -s user-keys[8] "\e[75;5~"
set -s user-keys[9] "\e[76;5~"
bind -n User6 select-pane -L
bind -n User7 select-pane -D
bind -n User8 select-pane -U
bind -n User9 select-pane -R

# ── Pane splitting (Ctrl+Shift+J/L, via iTerm escape sequences)
set -s user-keys[0] "\e[74;6~"
set -s user-keys[1] "\e[76;6~"
bind -n User0 split-window -v -c "#{pane_current_path}"
bind -n User1 split-window -h -c "#{pane_current_path}"

# ── Window navigation (Cmd+Left/Right, via iTerm escape sequences)
set -s user-keys[2] "\e[1;9D"
set -s user-keys[3] "\e[1;9C"
bind -n User2 previous-window
bind -n User3 next-window

# ── Window reordering (Cmd+Shift+Left/Right, via iTerm escape sequences)
set -s user-keys[4] "\e[1;10D"
set -s user-keys[5] "\e[1;10C"
bind -n User4 { swap-window -t -1; select-window -t -1 }
bind -n User5 { swap-window -t +1; select-window -t +1 }

# ── TPM (plugin manager) ──────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
