# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
setw -g mode-keys vi
set -g focus-events on
set -g extended-keys on
setw -g automatic-rename off

# ── Status bar ─────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235,fg=colour248'

# Left: session name
set -g status-left-length 30
set -g status-left '#[bg=colour24,fg=colour255,bold]  #S #[bg=colour235] '

# Right: date and time
set -g status-right-length 40
set -g status-right '#[fg=colour244] %b %d  %H:%M '

# Window tabs
setw -g window-status-format '#[fg=colour244] #I:#W '
setw -g window-status-current-format '#[bg=colour238,fg=colour81,bold] #I:#W '
setw -g window-status-separator ''

# ── Pane borders ───────────────────────────────────────
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# ── Message / command prompt ───────────────────────────
set -g message-style 'bg=colour235,fg=colour81'
set -g message-command-style 'bg=colour235,fg=colour81'

# ── Prefix ────────────────────────────────────────────
set -g prefix M-b
unbind C-b
bind M-b send-prefix

# ── Pane navigation (alt+hjkl) ────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Window navigation (alt+[]) ────────────────────────
bind -n M-[ previous-window
bind -n M-] next-window

# ── Window creation (alt+t) ─────────────────────────
bind -n M-t new-window -c "#{pane_current_path}"

# ── Pane creation (alt+shift+hjkl) ───────────────────
bind -n M-H split-window -hb -c "#{pane_current_path}"
bind -n M-J split-window -v -c "#{pane_current_path}"
bind -n M-K split-window -vb -c "#{pane_current_path}"
bind -n M-L split-window -h -c "#{pane_current_path}"

# ── Pane search (alt+f) ─────────────────────────────
bind -n M-f copy-mode \; send-keys /

# ── Pane close (alt+w) ──────────────────────────────
bind -n M-w confirm-before -p "Close pane? (y/n)" kill-pane

# ── Pane zoom (alt+=) ───────────────────────────────
bind -n M-= resize-pane -Z

# ── Pane resizing (alt+shift+arrow) ─────────────────
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Right resize-pane -R 5

# ── Workspace layout (lazygit + claude + shell) ────────
bind W display-popup -E -w 60% -h 40% '~/.config/tmux/workspace.sh'
bind P send-keys 'gh pr view --web' Enter

# ── Accent color (derived from directory + git context) ─
# Updates pane border, session badge, and all window tab colors on pane focus.
set-hook -g pane-focus-in {
  run-shell -b '~/.config/tmux/update-colors.sh "#{pane_current_path}" "#{session_name}"'
}

# ── TPM (plugin manager) ──────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'

# Install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
